name: FastAPI CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pytest flake8 httpx

      - name: Lint (flake8)
        run: flake8 . --max-line-length=120

      - name: Run unit tests (pytest)
        run: pytest -q

      # ---------- POSTMAN / NEWMAN ----------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman and reporters
        run: |
          npm install -g newman newman-reporter-htmlextra

      - name: Start FastAPI app (Uvicorn) in background
        run: |
          nohup uvicorn main:app --host 127.0.0.1 --port 8000 &
          # Wait for server to be ready
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              echo "Server is up!"
              break
            fi
            echo "Waiting for server..."
            sleep 1
          done

      - name: Run Postman tests with Newman
        run: |
          mkdir -p newman-reports
          newman run "postman/Staff API.postman_collection.json" </span>
            -e postman/local.postman_environment.json </span>
            --reporters cli,junit,htmlextra </span>
            --reporter-junit-export newman-reports/results.xml </span>
            --reporter-htmlextra-export newman-reports/report.html

      - name: Upload Newman reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-reports
          path: newman-reports
